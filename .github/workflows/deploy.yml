name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          # 创建一个只包含后端文件的临时仓库推送到 HF
          tmp=$(mktemp -d)
          cp Dockerfile "$tmp/"
          cp -r backend "$tmp/"
          # 创建 HF Spaces 需要的 README.md
          cat > "$tmp/README.md" << 'EOF'
          ---
          title: Dietary Assistant API
          emoji: 🥗
          colorFrom: green
          colorTo: yellow
          sdk: docker
          pinned: false
          ---
          EOF
          cd "$tmp"
          git init -b main
          git lfs install
          git add .
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "deploy backend"
          git remote add hf "https://user:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/dietary-assistant"
          git push hf main --force

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build Flutter Web
        working-directory: frontend/dietary_app
        run: |
          flutter pub get
          flutter build web --release --dart-define=API_BASE_URL=https://xixi-lsf-dietary-assistant.hf.space

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          cd frontend/dietary_app/build/web
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
