<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完美手绘风健康助手</title>
    <style>
        /* 引入可爱的手写感字体 */
        @import url('https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap');

        :root {
            --bg-base: #fdfaf1; /* 暖米色纸张感 */
            --line-brown: #8d6e63; /* 核心棕色线条 */
            --pink-super-light: #fff5f6; /* 极浅粉 */
            --green-super-light: #f5faf5; /* 极浅绿 */
            --text-main: #5d4037;
            --accent-soft: #ffdab9;
        }

        /* 关键滤镜：产生波浪手绘感 */
        svg[height="0"] { position: absolute; }

        body {
            background-color: var(--bg-base);
            /* 第一版的背景纹理回归 */
            background-image: radial-gradient(#e5e0d0 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            font-family: 'Hiragino Sans GB', 'Microsoft YaHei', cursive;
            margin: 0;
            padding: 30px;
            padding-bottom: 120px; /* 为底栏留位 */
            display: flex;
            justify-content: center;
        }

        /* 适配 Web 大页面的布局 */
        .page-wrapper {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* 左右比例 */
            gap: 30px;
        }

        .full-width { grid-column: 1 / -1; }

        /* 顶部日期 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px;
        }

        .header-area h1 {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 3rem;
            margin: 0;
            line-height: 1;
        }

        /* 模块基类：波浪虚线 + 倾斜 + 圆角 */
        .hand-card {
            background: white;
            padding: 25px;
            border: 3px dashed var(--line-brown);
            border-radius: 40px 15px 50px 20px / 20px 50px 15px 40px;
            filter: url(#wave-filter); /* 波浪滤镜 */
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 0px rgba(141, 110, 99, 0.1);
        }

        /* 随机倾斜感 */
        .card-tilt-left { transform: rotate(-1.2deg); }
        .card-tilt-right { transform: rotate(1deg); }
        .hand-card:hover { transform: rotate(0deg) scale(1.02); }

        .pink-tint { background-color: var(--pink-super-light); }
        .green-tint { background-color: var(--green-super-light); }

        /* 手绘小碗图标 */
        .sketch-bowl {
            width: 60px; height: 35px;
            border: 3px solid var(--line-brown);
            border-radius: 4px 4px 40px 40px;
            position: relative;
            background: white;
            margin-bottom: 10px;
        }
        .sketch-bowl::after {
            content: "♨️";
            position: absolute; top: -25px; left: 18px;
            font-size: 20px; opacity: 0.6;
        }

        /* 营养统计网格 */
        .nutri-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .nutri-item {
            background: white;
            border: 2px solid var(--line-brown);
            border-radius: 15px 25px 12px 20px;
            padding: 15px;
            text-align: center;
        }

        /* Q弹按钮 */
        .jelly-btn {
            background: white;
            border: 3px solid var(--line-brown);
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--line-brown);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 5px 5px 0 var(--line-brown);
            animation: jelly-anim 3s infinite;
            margin-top: 20px;
        }

        @keyframes jelly-anim {
            0%, 100% { transform: scale(1, 1); }
            30% { transform: scale(1.1, 0.9); }
            40% { transform: scale(0.9, 1.1); }
            50% { transform: scale(1.05, 0.95); }
        }

        .jelly-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 var(--line-brown);
        }

        /* 第一版底栏还原 */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 85px;
            background: #fffef0;
            border-top: 3px solid var(--line-brown);
            /* 纸张撕裂感边缘 */
            clip-path: polygon(
                0% 20%, 5% 0%, 10% 20%, 15% 0%, 20% 20%, 25% 0%, 30% 20%, 35% 0%, 40% 20%, 45% 0%, 50% 20%, 55% 0%, 60% 20%, 65% 0%, 70% 20%, 75% 0%, 80% 20%, 85% 0%, 90% 20%, 95% 0%, 100% 20%, 
                100% 100%, 0% 100%
            );
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--line-brown);
            margin-top: 15px;
        }

        .nav-icon {
            width: 32px; height: 32px;
            border: 2px solid var(--line-brown);
            border-radius: 10px 30px 15px 25px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 4px;
            font-size: 1.2rem;
        }

        @media (max-width: 800px) {
            .page-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <svg width="0" height="0">
        <filter id="wave-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
        </filter>
    </svg>

    <div class="page-wrapper">
        <header class="header-area full-width">
            <div>
                <h1>今日摘要 📒</h1>
                <p style="margin-top: 10px; opacity: 0.7;">4月19日 · 星期日 · 晴</p>
            </div>
            <div class="sketch-bowl"></div>
        </header>

        <div class="hand-card pink-tint card-tilt-left">
            <h3 style="margin-top:0;">🔥 今日摄入</h3>
            <div style="font-size: 4rem; font-family: 'Zhi Mang Xing';">0 <small style="font-size: 1.2rem; font-family: sans-serif;">kcal</small></div>
            <p style="font-size: 0.9rem; opacity: 0.6;">还没开始吃东西哦~</p>
        </div>

        <div class="hand-card card-tilt-right">
            <h3 style="margin-top:0;">📊 营养配比</h3>
            <div class="nutri-grid">
                <div class="nutri-item"><b>0.0g</b><br><small>蛋白质</small></div>
                <div class="nutri-item"><b>0.0g</b><br><small>碳水</small></div>
                <div class="nutri-item"><b>0.0g</b><br><small>脂肪</small></div>
                <div class="nutri-item"><b>0.0g</b><br><small>纤维</small></div>
            </div>
        </div>

        <div class="hand-card full-width card-tilt-left" style="min-height: 150px;">
            <h3 style="margin-top:0;">🍴 我的餐次</h3>
            <div style="border: 2px dashed #dcdcdc; border-radius: 20px; height: 100px; display: flex; align-items: center; justify-content: center; color: #aaa;">
                等待第一笔美味记录...
            </div>
        </div>

        <div class="hand-card green-tint full-width card-tilt-right" style="text-align: center; padding: 40px;">
            <h3 style="margin:0;">🌱 智能建议</h3>
            <p>想知道今天怎么吃更健康吗？</p>
            <button class="jelly-btn">获取建议</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">❄️</div>
            <span>冰箱</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🥂</div>
            <span>宴请</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📊</div>
            <span>营养</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🤖</div>
            <span>管家</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🧠</div>
            <span>记忆</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⚙️</div>
            <span>设置</span>
        </div>
    </nav>

</body>
</html>
